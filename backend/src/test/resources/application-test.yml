spring:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    out-of-order: false

app:
  cors:
    allowed-origins: http://localhost:3000

# Use fast BCrypt for tests (strength 4 vs production strength 12)
security:
  bcrypt:
    strength: 4

logging:
  level:
    root: WARN
    com.localapartmentexperts: WARN
    org.flywaydb: WARN
